<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quill Demo</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100vh; cursor: text; }
        #editor-container { height: 100%; border: none !important; }
        .ql-toolbar { display: none; } /* Hide toolbar for clean paper sheet look */
        .ql-container { border: none !important; font-size: 14px; }
    </style>
</head>
<body>
    <h3>Quill Editor</h3>
    <div id="editor-container"></div>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor-container', {
            theme: 'snow'
        });
        quill.root.innerHTML = '<p>Hello World! This is <strong>Quill</strong> inside Avalonia.</p>';
        
        window.simulateMagicCursor = function(ts, spk, text) {
            let html = `<p><span style="color:#888; font-size:10px;">[${ts}] [${spk}]</span> ${text}</p><p style="color:#006699; font-style:italic; margin-left: 20px;">↳ [Bản dịch tạm thời đang chờ xử lý...]</p>`;
            quill.clipboard.dangerouslyPasteHTML(quill.getLength(), html);
        };
        
        window.focusEditor = function() {
            quill.focus();
        };
        
        document.body.addEventListener('click', window.focusEditor);
    </script>
</body>
</html>
